name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

concurrency:
  group: build-desktop-apps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  metadata:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Read app version from package.json
        id: version
        run: echo "value=$(npm run --silent version:print)" >> "$GITHUB_OUTPUT"

  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: metadata
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run coverage gate
        run: npm run coverage

  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    needs:
      - metadata
      - validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: GNU/Linux
            build_script: build:linux
            artifact_glob: dist/*.AppImage
          - os: macos-latest
            label: macOS
            build_script: build:mac
            artifact_glob: dist/*.dmg
          - os: windows-latest
            label: Windows
            build_script: build:win
            artifact_glob: dist/*.exe
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: npm run ${{ matrix.build_script }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zenius-${{ needs.metadata.outputs.version }}-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
