name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

concurrency:
  group: build-desktop-apps-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  metadata:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Read app version from package.json
        id: version
        run: echo "value=$(npm run --silent version:print)" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: test "v$(npm run --silent version:print)" = "${GITHUB_REF_NAME}"

  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: metadata
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run coverage gate
        run: npm run coverage

  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    needs:
      - metadata
      - validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: GNU/Linux
            build_script: build:linux
            artifact_glob: dist/*.AppImage
          - os: macos-latest
            label: macOS
            build_script: build:mac
            artifact_glob: dist/*.dmg
          - os: windows-latest
            label: Windows
            build_script: build:win
            artifact_glob: dist/*.exe
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Require Apple signing secrets for macOS release builds
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        run: |
          test -n "${{ secrets.CSC_LINK }}"
          test -n "${{ secrets.CSC_KEY_PASSWORD }}"
          test -n "${{ secrets.APPLE_API_KEY }}"
          test -n "${{ secrets.APPLE_API_KEY_ID }}"
          test -n "${{ secrets.APPLE_API_ISSUER }}"

      - name: Write Apple API key
        if: runner.os == 'macOS' && secrets.APPLE_API_KEY != ''
        shell: bash
        run: |
          cat > "$RUNNER_TEMP/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8" <<'EOF'
          ${{ secrets.APPLE_API_KEY }}
          EOF

      - name: Build installer
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
        run: |
          if [[ "${{ runner.os }}" == "macOS" && -n "${APPLE_API_KEY_ID}" && -n "${APPLE_API_ISSUER}" && -f "${APPLE_API_KEY_PATH}" ]]; then
            export APPLE_API_KEY="${APPLE_API_KEY_PATH}"
          fi
          npm run ${{ matrix.build_script }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zenius-${{ needs.metadata.outputs.version }}-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - metadata
      - build
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: zenius-${{ needs.metadata.outputs.version }}-*
          merge-multiple: true
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Zenius ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/*.AppImage
            release-assets/*.dmg
            release-assets/*.exe
